<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flores para el Amor 💐</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
                * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #fff5f8 0%, #ffebee 50%, #fce4ec 100%);
            color: #4a3728;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* ── Fondo con pétalos flotantes ── */
        #bgCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* ── Layout principal (sin carta) ── */
        #escena {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 40px 20px;
            pointer-events: none; /* Dejar que el canvas maneje interacciones si es necesario */
        }
        #escena > * { pointer-events: auto; }

        /* ── Título ── */
        #titulo {
            text-align: center;
            font-family: 'Outfit', sans-serif;
            font-weight: 300;
            font-size: 1.2rem;
            color: #5d4037;
            opacity: 0;
            transform: translateY(-20px);
            transition: opacity 1.2s ease, transform 1.2s ease;
            line-height: 1.4;
            max-width: 600px;
        }
        #titulo.visible {
            opacity: 1;
            transform: translateY(0);
        }
        #titulo span {
            display: block;
            font-family: 'Dancing Script', cursive;
            font-size: 2.8rem;
            font-weight: 700;
            color: #d81b60;
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(216, 27, 96, 0.15);
        }

        /* ── Canvas del árbol ── */
        #canvasArbol {
            flex: 1;
            width: 100%;
            max-width: 800px;
            display: block;
            margin: 20px 0;
        }

        /* ── Contador inferior ── */
        #contador {
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1.5s ease 2s, transform 1.5s ease 2s;
            background: rgba(255, 255, 255, 0.3);
            padding: 15px 30px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        #contador.visible {
            opacity: 1;
            transform: translateY(0);
        }
        #texto-intro {
            font-size: 1rem;
            color: #8d6e63;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }
        #reloj {
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 10px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #5d4037;
        }
        #reloj .num {
            font-size: 1.8rem;
            font-weight: 700;
            color: #d81b60;
            font-family: 'Outfit', sans-serif;
        }
        #reloj .label {
            font-size: 0.8rem;
            color: #a1887f;
            margin-right: 2px;
            font-weight: 400;
        }

        /* ── Pantalla de carga ── */
        #loader {
            position: fixed;
            inset: 0;
            background: #fff5f8;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            transition: opacity 0.8s ease;
        }
        #loader.oculto {
            opacity: 0;
            pointer-events: none;
        }
        .loader-flor {
            width: 45px; height: 45px;
            border: 3px solid rgba(216, 27, 96, 0.1);
            border-top-color: #d81b60;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-txt {
            font-size: 0.9rem;
            color: #8d6e63;
            letter-spacing: 1px;
            font-weight: 300;
        }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            #titulo span { font-size: 2.2rem; }
            #titulo { font-size: 1rem; padding: 0 15px; }
            #reloj .num { font-size: 1.5rem; }
            #reloj { gap: 6px; }
            #contador { padding: 12px 20px; }
        }
        @media (min-height: 900px) {
            #escena { max-height: 820px; }
        }
    </style>
</head>
<body>

    <!-- Loader -->
    <div id="loader">
        <div class="loader-flor"></div>
        <div class="loader-txt">Preparando algo especial...</div>
    </div>

    <!-- Fondo animado -->
    <canvas id="bgCanvas"></canvas>

    <!-- Escena principal -->
    <div id="escena">
        <div id="titulo">
            <span>Flores para el amor</span>
            Un árbol que crece como lo nuestro...
        </div>
        <canvas id="canvasArbol"></canvas>
        <div id="contador">
            <div id="texto-intro">Mi amor por ti comenzó hace...</div>
            <div id="reloj"></div>
        </div>
    </div>

<script>
// ═══════════════════════════════════════════════════════
//  CONFIGURACIÓN
// ═══════════════════════════════════════════════════════
const FECHA_INICIO = new Date(2023, 7, 28); // 28 de Agosto 2023 (mes 7 = agosto, base 0)
const VELOCIDAD_CRECIMIENTO = 28;           // ms entre cada rama (más bajo = más rápido)
const TAMANO_FLOR = 38;                     // tamaño de las flores en px
const FORMA_CORAZON = true;                 // árbol con forma de corazón

// ═══════════════════════════════════════════════════════
//  ELEMENTOS
// ═══════════════════════════════════════════════════════
const canvas   = document.getElementById('canvasArbol');
const ctx      = canvas.getContext('2d');
const bgCanvas = document.getElementById('bgCanvas');
const bgCtx    = bgCanvas.getContext('2d');
const reloj    = document.getElementById('reloj');
const loader   = document.getElementById('loader');
const titulo   = document.getElementById('titulo');
const contador = document.getElementById('contador');

// ═══════════════════════════════════════════════════════
//  PRE-CARGA DE IMÁGENES
// ═══════════════════════════════════════════════════════
const rutas = [
    'assets/img/rosa.png',
    'assets/img/blanca.png',
    'assets/img/morada.png',
    'assets/img/blanco-rosa.png'
];

let imagenes = [];
let cargadas = 0;

rutas.forEach(ruta => {
    const img = new Image();
    img.src = ruta;
    img.onload = img.onerror = () => {
        cargadas++;
        if (img.complete && img.naturalWidth > 0) imagenes.push(img);
        if (cargadas === rutas.length) todoCargado();
    };
});

function todoCargado() {
    // Ocultar loader
    setTimeout(() => {
        loader.classList.add('oculto');
        iniciar();
    }, 600);
}

// ═══════════════════════════════════════════════════════
//  INICIALIZACIÓN
// ═══════════════════════════════════════════════════════
function iniciar() {
    ajustarCanvas();
    iniciarFondo();
    titulo.classList.add('visible');
    contador.classList.add('visible');

    // Iniciar el árbol después de un breve momento
    setTimeout(iniciarArbol, 800);

    // Iniciar reloj
    actualizarReloj();
    setInterval(actualizarReloj, 1000);
}

function ajustarCanvas() {
    const rect = canvas.parentElement.querySelector('#canvasArbol').getBoundingClientRect();
    canvas.width  = rect.width * window.devicePixelRatio;
    canvas.height = rect.height * window.devicePixelRatio;
    canvas.style.width  = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);

    bgCanvas.width  = window.innerWidth;
    bgCanvas.height = window.innerHeight;
}

window.addEventListener('resize', () => {
    ajustarCanvas();
    // Redibujar árbol
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    iniciarArbol();
});

// ═══════════════════════════════════════════════════════
//  FONDO ANIMADO (pétalos cayendo)
// ═══════════════════════════════════════════════════════
let particulas = [];

function iniciarFondo() {
    const cant = 35;
    for (let i = 0; i < cant; i++) {
        particulas.push({
            x: Math.random() * bgCanvas.width,
            y: Math.random() * bgCanvas.height,
            size: Math.random() * 5 + 2,
            speedX: (Math.random() - 0.5) * 0.5,
            speedY: Math.random() * 1 + 0.5,
            rotation: Math.random() * 360,
            rotationSpeed: (Math.random() - 0.5) * 2,
            alpha: Math.random() * 0.3 + 0.2,
            color: Math.random() > 0.5 ? '#ffebf0' : '#fce4ec'
        });
    }
    animarFondo();
}

function animarFondo() {
    bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
    particulas.forEach(p => {
        p.y += p.speedY;
        p.x += Math.sin(p.y / 30) * 0.5; // balanceo suave
        p.rotation += p.rotationSpeed;

        if (p.y > bgCanvas.height + 20) {
            p.y = -20;
            p.x = Math.random() * bgCanvas.width;
        }

        bgCtx.save();
        bgCtx.translate(p.x, p.y);
        bgCtx.rotate(p.rotation * Math.PI / 180);
        bgCtx.globalAlpha = p.alpha;
        
        // Dibujar un pequeño pétalo (elipse)
        bgCtx.beginPath();
        bgCtx.ellipse(0, 0, p.size, p.size * 0.6, 0, 0, Math.PI * 2);
        bgCtx.fillStyle = p.color;
        bgCtx.fill();
        
        bgCtx.restore();
    });
    requestAnimationFrame(animarFondo);
}

// ═══════════════════════════════════════════════════════
//  ÁRBOL CON FORMA DE CORAZÓN
// ═══════════════════════════════════════════════════════

// Puntos de la curva del corazón paramétrica
function puntoCorazon(t, escala) {
    const x = 16 * Math.pow(Math.sin(t), 3);
    const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
    return { x: x * escala, y: y * escala };
}

function iniciarArbol() {
    const cw = canvas.width / window.devicePixelRatio;
    const ch = canvas.height / window.devicePixelRatio;
    const centroX = cw / 2;
    const baseY   = ch - 20;

    // ── Dibujar tronco ──
    const trunkTopY = ch * 0.55;
    dibujarTronco(centroX, baseY, centroX, trunkTopY, () => {
        // ── Después del tronco, dibujar ramas en forma de corazón ──
        dibujarCopaCorazon(centroX, trunkTopY, cw, ch);
    });
}

function dibujarTronco(x1, y1, x2, y2, callback) {
    const pasos = 30;
    let paso = 0;
    const grosorBase = 8;
    const grosorTop  = 3;

    // Ligera curva en el tronco
    const cpx = x1 + 3;

    function frame() {
        const t  = paso / pasos;
        const t2 = (paso + 1) / pasos;

        // Bezier cuadrática simple
        const ax = (1-t)*(1-t)*x1 + 2*(1-t)*t*cpx + t*t*x2;
        const ay = (1-t)*(1-t)*y1 + 2*(1-t)*t*((y1+y2)/2) + t*t*y2;
        const bx = (1-t2)*(1-t2)*x1 + 2*(1-t2)*t2*cpx + t2*t2*x2;
        const by = (1-t2)*(1-t2)*y1 + 2*(1-t2)*t2*((y1+y2)/2) + t2*t2*y2;

        const grosor = grosorBase + (grosorTop - grosorBase) * t;

        ctx.beginPath();
        ctx.moveTo(ax, ay);
        ctx.lineTo(bx, by);
        ctx.strokeStyle = '#6b4226';
        ctx.lineWidth   = grosor;
        ctx.lineCap     = 'round';
        ctx.stroke();

        // Detalle de corteza
        if (paso % 4 === 0) {
            ctx.beginPath();
            ctx.moveTo(ax - grosor*0.3, ay);
            ctx.lineTo(ax + grosor*0.15, ay + 3);
            ctx.strokeStyle = 'rgba(90,55,25,0.3)';
            ctx.lineWidth = 0.8;
            ctx.stroke();
        }

        paso++;
        if (paso < pasos) {
            setTimeout(frame, VELOCIDAD_CRECIMIENTO);
        } else {
            if (callback) callback();
        }
    }
    frame();
}

function dibujarCopaCorazon(cx, topY, cw, ch) {
    // Generar puntos objetivo en forma de corazón
    const escala = Math.min(cw, ch) * 0.016;
    const centroCorazonY = topY - ch * 0.28;
    const puntosFlor = [];
    const totalFlores = 350; // Contorno súper definido

    for (let i = 0; i < totalFlores; i++) {
        const t = (i / totalFlores) * Math.PI * 2;
        const p = puntoCorazon(t, escala);
        // Variación ligera para naturalidad pero manteniendo la forma
        const jitterX = (Math.random() - 0.5) * escala * 3.5;
        const jitterY = (Math.random() - 0.5) * escala * 3.5;
        puntosFlor.push({
            x: cx + p.x + jitterX,
            y: centroCorazonY + p.y + jitterY
        });
    }

    // Añadir flores de relleno masivo para cubrir huecos
    const rellenoExtra = 450; 
    for (let i = 0; i < rellenoExtra; i++) {
        const t = Math.random() * Math.PI * 2;
        const p = puntoCorazon(t, escala);
        const factor = Math.sqrt(Math.random()); // Distribución más uniforme hacia los bordes
        puntosFlor.push({
            x: cx + p.x * factor + (Math.random() - 0.5) * escala * 2,
            y: centroCorazonY + p.y * factor + (Math.random() - 0.5) * escala * 2
        });
    }

    // Ordenar de abajo hacia arriba para efecto de crecimiento
    puntosFlor.sort((a, b) => b.y - a.y);

    // Dibujar ramas y flores progresivamente
    let idx = 0;
    const lote = 10; // Crecimiento rápido para tantas flores

    function dibujarSiguiente() {
        for (let j = 0; j < lote && idx < puntosFlor.length; j++, idx++) {
            const punto = puntosFlor[idx];

            // Rama (invisible según petición previa)
            dibujarRamita(cx, topY, punto.x, punto.y);

            // Flor con preservación de aspecto
            if (imagenes.length > 0) {
                const flor = imagenes[Math.floor(Math.random() * imagenes.length)];
                const baseTam = TAMANO_FLOR + (Math.random() - 0.5) * 15;
                
                // Calcular dimensiones para evitar distorsión
                const ratio = flor.width / flor.height;
                let w = baseTam;
                let h = baseTam;
                if (ratio > 1) h = baseTam / ratio;
                else w = baseTam * ratio;

                ctx.save();
                ctx.globalAlpha = 0.95;
                ctx.drawImage(flor, punto.x - w/2, punto.y - h/2, w, h);
                ctx.restore();
            }
        }

        if (idx < puntosFlor.length) {
            setTimeout(dibujarSiguiente, VELOCIDAD_CRECIMIENTO);
        }
    }

    dibujarSiguiente();
}

function dibujarRamita(fromX, fromY, toX, toY) {
    // Las ramas pequeñas ahora no se dibujan para que las flores parezcan flotar mágicamente
    // en la forma del corazón, manteniendo el diseño limpio.
}

// ═══════════════════════════════════════════════════════
//  RELOJ / CONTADOR
// ═══════════════════════════════════════════════════════
function actualizarReloj() {
    const ahora = new Date();
    const diff  = ahora - FECHA_INICIO;

    if (diff < 0) {
        reloj.innerHTML = '<span style="color:#c0392b;">Pronto comenzará nuestra historia...</span>';
        return;
    }

    const dias  = Math.floor(diff / (1000 * 60 * 60 * 24));
    const horas = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const mins  = Math.floor((diff / (1000 * 60)) % 60);
    const segs  = Math.floor((diff / 1000) % 60);

    reloj.innerHTML =
        `<span class="num">${dias}</span> <span class="label">días</span>` +
        `<span class="num">${horas}</span> <span class="label">horas</span>` +
        `<span class="num">${mins}</span> <span class="label">minutos</span>` +
        `<span class="num">${segs}</span> <span class="label">segundos</span>`;
}

</script>
</body>
</html>
